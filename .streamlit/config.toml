[theme]
base = "dark"
backgroundColor = "#0E1117"
secondaryBackgroundColor = "#1A1F2B"
primaryColor = "#FFE600"
textColor = "#FFFFFF"
font = "sans serif"

[server]
headless = true
port = 8501
enableCORS = false
enableXsrfProtection = false

[browser]
gatherUsageStats = false

[runner]
fastReruns = true
